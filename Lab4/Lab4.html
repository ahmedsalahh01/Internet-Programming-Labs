<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Interactive To Do List</title>
  <link rel="stylesheet" href="./Lab4.css" />
</head>
<body>
  <main class="To-do">
    <h1>To Do List</h1>

    <section class="input-row">
      <label for="taskInput" class="sr-only">Task description</label>
      <input id="taskInput" type="text" placeholder="Enter a task..." />
      <button id="addTaskBtn" type="button">Add Task</button>
    </section>

    <ul id="taskList" aria-label="Task list"></ul>
  </main>

  <script src="./Lab4.js"></script>
</body>
</html>
